name: Render profile

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    branches:
      - main
    paths:
      - "profile.toml"
      - "assets/**"
      - "templates/**"
      - "scripts/render_profile.py"
      - ".github/workflows/render-profile.yml"

permissions:
  contents: write

concurrency:
  group: profile-render
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Render profile and refresh public statistics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/render_profile.py --fetch-stats

      - name: Commit generated SVG files when changed
        shell: bash
        run: |
          if git diff --quiet -- light_mode.svg dark_mode.svg; then
            echo "Profile is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add light_mode.svg dark_mode.svg
          git commit -m "chore: render profile"
          git push
