    .key { fill: #9a4a00; }
    .value { fill: #0969da; }
    .green { fill: #1a7f37; }
    .portrait { fill: #24292f; font-size: 10.4px; letter-spacing: -0.45px; }
    .outline {
      fill: none;
      stroke: #57606a;
      stroke-width: 1.45;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .88;
    }
    .feature {
      fill: none;
      stroke: #24292f;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .95;
    }
    .feature-dot { fill: #24292f; opacity: .92; }
  </style>

